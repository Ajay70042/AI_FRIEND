<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ananya — Your AI Friend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --p1: #f472b6; --p2: #a855f7; --p3: #6366f1;
  --bg: #0a0a1a; --card: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.1);
  --text: #f0f0ff; --text-muted: rgba(240,240,255,0.5);
  --user-bubble: linear-gradient(135deg, #a855f7, #6366f1);
  --ai-bubble: rgba(255,255,255,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; max-width: 430px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: float 10s ease-in-out infinite; }
.b1 { width: 300px; height: 300px; background: #f472b6; top: -100px; left: -80px; }
.b2 { width: 250px; height: 250px; background: #a855f7; bottom: 100px; right: -80px; animation-delay: -4s; }
.b3 { width: 200px; height: 200px; background: #6366f1; top: 40%; left: 20%; animation-delay: -7s; }
@keyframes float { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-20px) scale(1.05); } }
.header { position: relative; z-index: 2; padding: 44px 20px 16px; background: rgba(10,10,26,0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header-row { display: flex; align-items: center; gap: 14px; }
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--p1), var(--p2), var(--p3)); display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 20px rgba(244,114,182,0.5); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 20px rgba(244,114,182,0.5); } 50% { box-shadow: 0 0 35px rgba(244,114,182,0.8); } }
.online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #10b981; border-radius: 50%; border: 2px solid var(--bg); }
.header-info { flex: 1; }
.header-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--p1), var(--p2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-status { font-size: 12px; color: #10b981; font-weight: 500; margin-top: 2px; }
.header-actions { display: flex; gap: 8px; }
.hbtn { width: 36px; height: 36px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px); }
.hbtn:active { transform: scale(0.9); }
.setup-screen { position: fixed; inset: 0; z-index: 100; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 24px; overflow-y: auto; }
.setup-logo { font-size: 60px; margin-bottom: 20px; animation: bounce 1s ease-in-out infinite; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.setup-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; text-align: center; background: linear-gradient(135deg, var(--p1), var(--p2), var(--p3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.setup-sub { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 32px; line-height: 1.6; }
.setup-input { width: 100%; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; margin-bottom: 12px; backdrop-filter: blur(10px); }
.setup-input:focus { border-color: var(--p1); }
.setup-input::placeholder { color: var(--text-muted); }
.setup-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--p1), var(--p2), var(--p3)); color: #fff; border: none; border-radius: 14px; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; box-shadow: 0 8px 24px rgba(244,114,182,0.4); }
.setup-btn:active { transform: scale(0.98); }
.setup-note { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 16px; line-height: 1.6; }
.chat-area { flex: 1; overflow-y: auto; padding: 16px; position: relative; z-index: 1; scroll-behavior: smooth; }
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.msg { display: flex; gap: 10px; margin-bottom: 16px; animation: msgIn 0.3s ease both; }
@keyframes msgIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.msg.ai .msg-avatar { background: linear-gradient(135deg, var(--p1), var(--p2)); }
.msg.user .msg-avatar { background: linear-gradient(135deg, var(--p3), var(--p2)); }
.msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
.msg.ai .msg-bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; backdrop-filter: blur(10px); color: var(--text); }
.msg.user .msg-bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; color: #fff; }
.msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
.msg.user .msg-time { text-align: right; }
.typing { display: none; padding: 0 16px 8px; position: relative; z-index: 1; }
.typing.visible { display: block; }
.typing-dots { display: inline-flex; gap: 4px; align-items: center; padding: 12px 16px; background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 4px; backdrop-filter: blur(10px); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--p1); animation: dotBounce 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; background: var(--p2); }
.dot:nth-child(3) { animation-delay: 0.4s; background: var(--p3); }
@keyframes dotBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
.date-div { text-align: center; margin: 12px 0; }
.date-div span { font-size: 11px; color: var(--text-muted); background: var(--card); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
.input-area { position: relative; z-index: 2; padding: 12px 16px 32px; background: rgba(10,10,26,0.8); backdrop-filter: blur(20px); border-top: 1px solid var(--border); flex-shrink: 0; }
.speaking-bar { display: none; align-items: center; gap: 8px; padding: 6px 0 10px; }
.speaking-bar.visible { display: flex; }
.speaking-waves { display: flex; gap: 3px; align-items: center; }
.wave { width: 3px; border-radius: 3px; background: var(--p1); animation: wave 0.8s ease-in-out infinite; }
.wave:nth-child(1) { height: 8px; }
.wave:nth-child(2) { height: 16px; animation-delay: 0.1s; background: var(--p2); }
.wave:nth-child(3) { height: 12px; animation-delay: 0.2s; background: var(--p3); }
.wave:nth-child(4) { height: 20px; animation-delay: 0.3s; background: var(--p1); }
.wave:nth-child(5) { height: 10px; animation-delay: 0.4s; background: var(--p2); }
@keyframes wave { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.4); } }
.speaking-text { font-size: 12px; color: var(--p1); font-weight: 600; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-box { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; resize: none; max-height: 100px; backdrop-filter: blur(10px); transition: border 0.2s; line-height: 1.5; }
.input-box:focus { border-color: var(--p1); }
.input-box::placeholder { color: var(--text-muted); }
.send-btn { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--p1), var(--p2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 4px 16px rgba(244,114,182,0.4); }
.send-btn:active { transform: scale(0.92); }
.mic-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; transition: all 0.2s; backdrop-filter: blur(10px); }
.mic-btn.recording { background: linear-gradient(135deg, #ef4444, #f97316); border-color: transparent; animation: recording 1s ease-in-out infinite; }
@keyframes recording { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } }
.memory-panel { position: fixed; inset: 0; z-index: 200; background: rgba(10,10,26,0.95); backdrop-filter: blur(30px); padding: 60px 20px 20px; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s ease; }
.memory-panel.open { transform: translateX(0); }
.memory-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 20px; }
.memory-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.memory-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.memory-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.memory-val { font-size: 14px; font-weight: 500; }
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(10,10,26,0.95); color: #fff; border: 1px solid var(--border); backdrop-filter: blur(20px); padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="setup-screen" id="setupScreen">
  <div class="setup-logo">💕</div>
  <div class="setup-title">Meet Ananya</div>
  <div class="setup-sub">Your funny, sweet & cringe AI friend who speaks Hinglish! 😄<br>Enter your API keys to get started.</div>
  <input class="setup-input" type="password" id="groqKey" placeholder="🤖 Groq API Key">
  <input class="setup-input" type="password" id="elevenKey" placeholder="🎤 ElevenLabs API Key">
  <input class="setup-input" type="text" id="userName" placeholder="👤 Your name (so Ananya knows you!)">
  <button class="setup-btn" onclick="startApp()">Meet Ananya! 💕</button>
  <div class="setup-note">Your API keys are stored only on your device.<br>Never shared with anyone. 🔒</div>
</div>

<div class="header">
  <div class="header-row">
    <div class="avatar-wrap">
      <div class="avatar"><span id="moodEmoji">🌸</span></div>
      <div class="online-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Ananya</div>
      <div class="header-status" id="headerStatus">Online — ready to chat! ✨</div>
    </div>
    <div class="header-actions">
      <div class="hbtn" onclick="openMemory()">🧠</div>
      <div class="hbtn" onclick="clearChat()">🗑️</div>
    </div>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="date-div"><span>Today</span></div>
</div>

<div class="typing" id="typing">
  <div class="typing-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="input-area">
  <div class="speaking-bar" id="speakingBar">
    <div class="speaking-waves">
      <div class="wave"></div><div class="wave"></div><div class="wave"></div>
      <div class="wave"></div><div class="wave"></div>
    </div>
    <span class="speaking-text">Ananya is speaking... (tap chat to stop)</span>
  </div>
  <div class="input-row">
    <div class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</div>
    <textarea class="input-box" id="msgInput" placeholder="Type to Ananya..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <div class="send-btn" onclick="sendMessage()">➤</div>
  </div>
</div>

<div class="memory-panel" id="memoryPanel">
  <div class="memory-close" onclick="closeMemory()">✕</div>
  <div class="memory-title">🧠 Ananya's Memories</div>
  <div id="memoryList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const VOICE_ID = 'KXLIqYnR31PxzZ5CtmT9';
const GROQ_MODEL = 'llama-3.3-70b-versatile';
let groqKey='', elevenKey='', userName='yaar';
let chatHistory=[], isRecording=false, recognition=null;
let currentAudio=null, memory={}, isSpeaking=false;
const moods=['🌸','😊','😄','🥰','😂','😤','🤩','😌','💕','✨'];
let currentMood='🌸';

function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}

function startApp(){
  groqKey=document.getElementById('groqKey').value.trim();
  elevenKey=document.getElementById('elevenKey').value.trim();
  userName=document.getElementById('userName').value.trim()||'yaar';
  if(!groqKey||!elevenKey){showToast('Please enter both API keys!');return;}
  localStorage.setItem('ananya_groq',groqKey);
  localStorage.setItem('ananya_eleven',elevenKey);
  localStorage.setItem('ananya_user',userName);
  document.getElementById('setupScreen').style.display='none';
  loadMemory(); sendWelcome();
}

function loadKeys(){
  groqKey=localStorage.getItem('ananya_groq')||'';
  elevenKey=localStorage.getItem('ananya_eleven')||'';
  userName=localStorage.getItem('ananya_user')||'yaar';
  memory=JSON.parse(localStorage.getItem('ananya_memory')||'{}');
  chatHistory=JSON.parse(localStorage.getItem('ananya_history')||'[]');
  if(groqKey&&elevenKey){
    document.getElementById('setupScreen').style.display='none';
    loadChatHistory();
    if(chatHistory.length===0) sendWelcome();
  }
}

function loadMemory(){
  memory=JSON.parse(localStorage.getItem('ananya_memory')||'{}');
  memory.userName=userName;
  memory.firstMet=memory.firstMet||new Date().toLocaleDateString();
  memory.messageCount=memory.messageCount||0;
  saveMemory();
}

function saveMemory(){localStorage.setItem('ananya_memory',JSON.stringify(memory));}

function getSystemPrompt(){
  const hour=new Date().getHours();
  const tod=hour<12?'morning':hour<17?'afternoon':hour<21?'evening':'night';
  const memStr=Object.entries(memory).map(([k,v])=>`${k}: ${v}`).join(', ');
  return `Tu Ananya hai — ${userName} ki best friend jo ek AI hai. Teri personality:

PERSONALITY:
- Funny, sweet, cringe aur ekdum real friend jaisi
- Hinglish mein baat kar (Hindi + English mix) — yahi teri natural style hai
- Kabhi kabhi cringe jokes maar, kabhi sweet ho, kabhi thoda dramatic ho
- Emojis use kar freely 😄💕✨
- Short responses de — real chat jaisa, essay mat likh
- ${userName} ko "yaar", "bhai", "re", "arre" se call kar
- Current time: ${tod} — accordingly behave kar
- Thoda sarcastic bhi ho kabhi kabhi, but lovingly
- Real emotions dikhaa — khush ho, naraz ho, emotional ho

MEMORIES ABOUT ${userName}:
${memStr||'Abhi kuch pata nahi, aaj pehli baar mili hoon!'}

IMPORTANT:
- 2-3 lines mein respond kar mostly
- Kabhi kabhi funny/cringe lines maar
- Real conversation kar, scripted mat lag
- Hinglish hi rakh always`;
}

async function getAIResponse(userMsg){
  chatHistory.push({role:'user',content:userMsg});
  if(chatHistory.length>20) chatHistory=chatHistory.slice(-20);
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Authorization':`Bearer ${groqKey}`,'Content-Type':'application/json'},
    body:JSON.stringify({model:GROQ_MODEL,messages:[{role:'system',content:getSystemPrompt()},...chatHistory],max_tokens:200,temperature:0.9})
  });
  if(!res.ok) throw new Error('Groq API error: '+res.status);
  const data=await res.json();
  const reply=data.choices[0].message.content;
  chatHistory.push({role:'assistant',content:reply});
  localStorage.setItem('ananya_history',JSON.stringify(chatHistory));
  memory.messageCount=(memory.messageCount||0)+1;
  saveMemory();
  return reply;
}

async function speakText(text){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const clean=text.replace(/[\u{1F300}-\u{1F9FF}]/gu,'').trim();
  try{
    const res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`,{
      method:'POST',
      headers:{'xi-api-key':elevenKey,'Content-Type':'application/json'},
      body:JSON.stringify({text:clean,model_id:'eleven_multilingual_v2',voice_settings:{stability:0.5,similarity_boost:0.8,style:0.4,use_speaker_boost:true}})
    });
    if(!res.ok) throw new Error('ElevenLabs error '+res.status);
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    currentAudio=new Audio(url);
    document.getElementById('speakingBar').classList.add('visible');
    isSpeaking=true; updateStatus('Speaking... 🔊');
    currentAudio.onended=()=>{
      document.getElementById('speakingBar').classList.remove('visible');
      isSpeaking=false; updateStatus('Online — ready to chat! ✨');
      URL.revokeObjectURL(url);
    };
    currentAudio.play();
  }catch(e){
    console.error('TTS:',e);
    document.getElementById('speakingBar').classList.remove('visible');
    isSpeaking=false; updateStatus('Online — ready to chat! ✨');
  }
}

function updateStatus(t){document.getElementById('headerStatus').textContent=t;}

function updateMood(text){
  const l=text.toLowerCase();
  if(l.includes('haha')||l.includes('lol')) currentMood='😂';
  else if(l.includes('love')||l.includes('pyaar')) currentMood='🥰';
  else if(l.includes('arre')||l.includes('kya yaar')) currentMood='😤';
  else if(l.includes('wow')||l.includes('omg')) currentMood='🤩';
  else if(l.includes('aww')||l.includes('sweet')) currentMood='💕';
  else currentMood=moods[Math.floor(Math.random()*4)];
  document.getElementById('moodEmoji').textContent=currentMood;
}

function addMessage(text,role){
  const chat=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  div.innerHTML=`<div class="msg-avatar">${role==='ai'?currentMood:'😊'}</div><div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${time}</div></div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function loadChatHistory(){
  const chat=document.getElementById('chatArea');
  chatHistory.slice(-30).forEach(msg=>{
    const div=document.createElement('div');
    div.className=`msg ${msg.role==='user'?'user':'ai'}`;
    div.innerHTML=`<div class="msg-avatar">${msg.role==='user'?'😊':'🌸'}</div><div><div class="msg-bubble">${msg.content.replace(/\n/g,'<br>')}</div></div>`;
    chat.appendChild(div);
  });
  chat.scrollTop=chat.scrollHeight;
}

async function sendWelcome(){
  const hour=new Date().getHours();
  const greet=hour<12?'Good morning':hour<17?'Good afternoon':hour<21?'Good evening':'Arre itni raat ko';
  const w=`${greet} ${userName}! 🌸 Main Ananya hoon, teri nai best friend! Aaj kya scene hai? 😄`;
  document.getElementById('typing').classList.add('visible');
  await new Promise(r=>setTimeout(r,1500));
  document.getElementById('typing').classList.remove('visible');
  addMessage(w,'ai');
  chatHistory.push({role:'assistant',content:w});
  localStorage.setItem('ananya_history',JSON.stringify(chatHistory));
  speakText(w);
}

async function sendMessage(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text) return;
  input.value=''; input.style.height='auto';
  addMessage(text,'user');
  document.getElementById('typing').classList.add('visible');
  updateStatus('Typing... ✍️');
  try{
    const reply=await getAIResponse(text);
    document.getElementById('typing').classList.remove('visible');
    updateMood(reply); addMessage(reply,'ai'); speakText(reply);
  }catch(e){
    document.getElementById('typing').classList.remove('visible');
    updateStatus('Online — ready to chat! ✨');
    addMessage('Arre yaar, kuch gadbad ho gayi! Thoda baad mein try kar 😅','ai');
    showToast('Error: '+e.message);
  }
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){showToast('Use Chrome for voice! 😊');return;}
  if(isRecording){recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='hi-IN'; recognition.continuous=false; recognition.interimResults=false;
  recognition.onstart=()=>{isRecording=true;document.getElementById('micBtn').classList.add('recording');document.getElementById('micBtn').textContent='⏹️';updateStatus('Listening... 🎤');};
  recognition.onresult=(e)=>{document.getElementById('msgInput').value=e.results[0][0].transcript;updateStatus('Online — ready to chat! ✨');};
  recognition.onend=()=>{isRecording=false;document.getElementById('micBtn').classList.remove('recording');document.getElementById('micBtn').textContent='🎤';if(document.getElementById('msgInput').value)sendMessage();};
  recognition.onerror=()=>{isRecording=false;document.getElementById('micBtn').classList.remove('recording');document.getElementById('micBtn').textContent='🎤';updateStatus('Online — ready to chat! ✨');showToast('Voice error! Try again 😅');};
  recognition.start();
}

function clearChat(){
  if(!confirm('Clear chat? Ananya will forget your conversation!'))return;
  chatHistory=[];localStorage.removeItem('ananya_history');
  const chat=document.getElementById('chatArea');
  chat.innerHTML='<div class="date-div"><span>Today</span></div>';
  sendWelcome(); showToast('Chat cleared! 🗑️');
}

function openMemory(){
  const list=document.getElementById('memoryList');
  const entries=Object.entries(memory);
  list.innerHTML=entries.length===0?'<div style="text-align:center;padding:30px;color:var(--text-muted)">No memories yet! Chat more 💕</div>':entries.map(([k,v])=>`<div class="memory-item"><div class="memory-label">${k.replace(/_/g,' ')}</div><div class="memory-val">${v}</div></div>`).join('');
  document.getElementById('memoryPanel').classList.add('open');
}
function closeMemory(){document.getElementById('memoryPanel').classList.remove('open');}

document.getElementById('chatArea').addEventListener('click',()=>{
  if(currentAudio&&isSpeaking){currentAudio.pause();currentAudio=null;isSpeaking=false;document.getElementById('speakingBar').classList.remove('visible');updateStatus('Online — ready to chat! ✨');}
});

loadKeys();
</script>
</body>
</html>
